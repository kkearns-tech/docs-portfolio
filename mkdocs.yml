site_name: Popstiche Ops Documentation
site_description: Operations documentation and system design notes for Popstiche
site_url: https://YOUR_GITHUB_USERNAME.github.io/popstiche-ops-docs/

repo_url: https://github.com/YOUR_GITHUB_USERNAME/popstiche-ops-docs
repo_name: YOUR_GITHUB_USERNAME/popstiche-ops-docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Project:
      - Roadmap: project/roadmap.md
      - Decisions: project/decisions.md
      - Changelog: project/changelog.md
      - Glossary: project/glossary.md
      - Status Reports: project/status-reports/template.md
  - Product:
      - Overview: product/overview.md
      - Personas & Roles: product/personas-and-roles.md
      - Workflows:
          - Event Day: product/workflows/event-day.md
          - Prep Day: product/workflows/prep-day.md
          - Reconciliation: product/workflows/reconciliation.md
  - System:
      - Architecture: product/system/architecture.md
      - Data Model: product/system/data-model.md